<style>
:root {
  --ink:     #0e0e12;
  --paper:   #f0ede8;
  --signal:  oklch(72% 0.21 185);
  --signal-d: oklch(52% 0.17 185);
  --signal-bg: oklch(72% 0.21 185 / 0.07);
  --gold:    oklch(72% 0.14 80);
  --gold-bg: oklch(72% 0.14 80 / 0.07);
  --muted:   oklch(46% 0.004 240);
  --dim:     oklch(30% 0.004 240);
  --border:  oklch(20% 0.005 240);
  --surf:    oklch(15% 0.005 240);
  --surf2:   oklch(18% 0.005 240);
  --fn-disp:  'Syne', sans-serif;
  --fn-serif: 'DM Serif Display', Georgia, serif;
  --fn-mono:  'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--ink); color: var(--paper); font-family: var(--fn-disp); overflow-x: hidden; cursor: none; }
::selection { background: var(--signal); color: var(--ink); }
::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-track { background: var(--ink); }
::-webkit-scrollbar-thumb { background: var(--signal); }

/* ── CURSOR ── */
#c-dot {
  position: fixed; top: 0; left: 0; z-index: 9999;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--signal); pointer-events: none;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 16px var(--signal), 0 0 4px var(--signal);
  transition: width .15s, height .15s, background .2s;
}
#c-ring {
  position: fixed; top: 0; left: 0; z-index: 9998;
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid oklch(72% 0.21 185 / 0.5);
  pointer-events: none; transform: translate(-50%,-50%);
  transition: width .25s cubic-bezier(.16,1,.3,1),
              height .25s cubic-bezier(.16,1,.3,1),
              border-color .2s; 
}
body.hov #c-dot  { width: 10px; height: 10px; background: var(--gold); box-shadow: 0 0 16px var(--gold); }
body.hov #c-ring { width: 52px; height: 52px; border-color: oklch(72% 0.14 80 / 0.4); }

/* ── NOISE ── */
#noise { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .028; mix-blend-mode: screen; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 64px;
  mix-blend-mode: difference;
}
.nav-logo {
  font-family: var(--fn-mono); font-size: 11px; color: var(--paper);
  letter-spacing: .14em; text-transform: uppercase; opacity: .55;
}
.nav-links { display: flex; gap: 40px; list-style: none; }
.nav-links a {
  font-family: var(--fn-mono); font-size: 10px; color: var(--paper);
  text-decoration: none; letter-spacing: .16em; text-transform: uppercase;
  opacity: .3; transition: opacity .3s;
  position: relative;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -3px; left: 0; right: 0; height: 1px;
  background: var(--signal); transform: scaleX(0); transform-origin: left;
  transition: transform .3s cubic-bezier(.16,1,.3,1);
}
.nav-links a:hover { opacity: 1; }
.nav-links a:hover::after { transform: scaleX(1); }

/* ── HERO ── */
#hero {
  position: relative; z-index: 1;
  min-height: 100vh; overflow: hidden;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 0 0 72px;
}
.hero-canvas { position: absolute; inset: 0; pointer-events: none; }
.hero-meta-top {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 28px 64px 0;
  display: flex; justify-content: space-between; align-items: flex-start;
  z-index: 2;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--fn-mono); font-size: 10px; letter-spacing: .2em;
  color: var(--signal); text-transform: uppercase;
}
.hero-badge::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: var(--signal); animation: blink 2.4s step-end infinite;
  box-shadow: 0 0 8px var(--signal);
}
@keyframes blink { 50% { opacity: 0; } }
.hero-loc { font-family: var(--fn-mono); font-size: 10px; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; margin-top: 8px; }
.hero-tr { text-align: right; }
.hero-tr-line { font-family: var(--fn-mono); font-size: 10px; color: oklch(38% .004 240); letter-spacing: .1em; line-height: 2.2; }

/* The name */
.hero-name {
  position: relative; z-index: 2;
  padding: 0 64px;
  line-height: .9;
  text-align: left;
}
.hero-line {
  display: block;
  font-family: var(--fn-disp);
  font-weight: 800;
  font-size: clamp(56px, 9vw, 130px);
  letter-spacing: -.02em;
}
.hero-line-1 { color: var(--paper); }
.hero-line-2 { color: transparent; -webkit-text-stroke: 1px oklch(40% .004 240); }
.hero-line-2 .outline-signal { -webkit-text-stroke: 1px var(--signal); color: transparent; }

.hero-bottom {
  position: relative; z-index: 2;
  padding: 0 64px;
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-top: 40px;
  flex-wrap: wrap; gap: 20px;
}
.hero-desc {
  font-family: var(--fn-serif); font-style: italic;
  font-size: clamp(15px, 1.6vw, 21px); color: oklch(48% .004 240);
  max-width: 460px; line-height: 1.65;
  border-left: 2px solid var(--border); padding-left: 20px;
}
.hero-desc em { font-style: normal; color: var(--paper); }
.hero-scroll {
  font-family: var(--fn-mono); font-size: 9px; letter-spacing: .22em;
  color: var(--dim); text-transform: uppercase;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  animation: scrollPulse 3s ease-in-out infinite;
}
.hero-scroll::after {
  content: ''; width: 1px; height: 40px; background: linear-gradient(to bottom, var(--signal), transparent);
}
@keyframes scrollPulse { 0%,100%{transform:translateY(0)} 50%{transform:translateY(8px)} }

/* ── MARQUEE ── */
.marquee-strip {
  position: relative; z-index: 1;
  overflow: hidden; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  padding: 18px 0; background: var(--surf);
}
.marquee-inner {
  display: flex; gap: 0; white-space: nowrap;
  animation: marquee 28s linear infinite;
}
.marquee-inner:hover { animation-play-state: paused; }
.marquee-item {
  flex-shrink: 0; display: flex; align-items: center; gap: 40px;
  padding: 0 40px; font-family: var(--fn-mono); font-size: 10px;
  letter-spacing: .18em; text-transform: uppercase; color: var(--dim);
}
.marquee-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--signal); flex-shrink: 0; }
@keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

/* ── SHARED ── */
section { position: relative; z-index: 1; overflow: hidden; scroll-margin-top: 80px; }
.wrap { max-width: 1080px; margin: 0 auto; padding: 0 64px; }
.sec-label {
  font-family: var(--fn-mono); font-size: 9px; letter-spacing: .28em;
  color: var(--signal); text-transform: uppercase; display: block; margin-bottom: 14px;
}
.sec-title {
  font-family: var(--fn-disp); font-weight: 800;
  font-size: clamp(44px, 5.5vw, 84px); color: var(--paper);
  letter-spacing: -.02em; line-height: .92;
}
/* Ghost section numbers */
.ghost-num {
  position: absolute; right: 48px; top: 80px;
  font-family: var(--fn-disp); font-weight: 800;
  font-size: clamp(100px, 14vw, 180px);
  color: oklch(100% 0 0 / 0.025); line-height: 1;
  pointer-events: none; user-select: none; letter-spacing: -.04em;
  z-index: 0;
}

/* Fade in */
.fi { opacity: 0; transform: translateY(24px); transition: opacity .9s cubic-bezier(.16,1,.3,1), transform .9s cubic-bezier(.16,1,.3,1); }
.fi.vis { opacity: 1; transform: none; }

/* ── ABOUT ── */
#about { padding: 140px 0 120px; border-top: 1px solid var(--border); }
.about-pullquote {
  font-family: var(--fn-serif); font-style: italic;
  font-size: clamp(22px, 2.6vw, 36px); color: var(--paper);
  line-height: 1.35; margin: 72px 0;
  padding: 0 0 0 36px; border-left: 2px solid var(--signal);
  max-width: 700px;
}
.about-pullquote em { font-style: normal; color: var(--signal); }
.about-grid { display: grid; grid-template-columns: 1fr 340px; gap: 80px; align-items: start; }
.about-text { font-size: 16px; line-height: 1.9; color: oklch(56% .004 240); max-width: 560px; }
.about-text p + p { margin-top: 22px; }
.about-text strong { color: var(--paper); font-weight: 600; }
/* Stats: oversized */
.stat-list { display: flex; flex-direction: column; }
.stat-row {
  display: grid; grid-template-columns: 1fr auto; align-items: baseline;
  padding: 22px 0; border-bottom: 1px solid var(--border);
  gap: 12px;
}
.stat-row:first-child { border-top: 1px solid var(--border); }
.stat-n { font-family: var(--fn-disp); font-weight: 800; font-size: 68px; line-height: 1; color: var(--paper); }
.stat-n sup { font-size: 28px; color: var(--signal); vertical-align: super; }
.stat-l { font-family: var(--fn-mono); font-size: 10px; letter-spacing: .14em; color: var(--muted); text-transform: uppercase; text-align: right; max-width: 130px; }
/* Currently widget */
.currently {
  margin-top: 28px; padding: 28px 28px 20px;
  border: 1px solid var(--border); background: var(--surf);
  position: relative; overflow: hidden;
}
.currently::before {
  content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
  background: var(--signal);
}
.curr-label { font-family: var(--fn-mono); font-size: 9px; letter-spacing: .25em; color: var(--signal); text-transform: uppercase; margin-bottom: 22px; display: flex; align-items: center; gap: 8px; }
.curr-label::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--signal); animation: blink 2.4s step-end infinite; box-shadow: 0 0 6px var(--signal); }
.curr-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid oklch(20% .005 240 / 0.6); }
.curr-k { font-family: var(--fn-mono); font-size: 10px; color: var(--dim); letter-spacing: .08em; text-transform: uppercase; }
.curr-v { font-family: var(--fn-disp); font-size: 13px; color: var(--paper); font-weight: 600; text-align: right; }

/* ── WORK ── */
#work { padding: 140px 0; border-top: 1px solid var(--border); }
.work-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 72px; flex-wrap: wrap; gap: 24px; }
.work-filters { display: flex; gap: 6px; flex-wrap: wrap; }
.wf {
  font-family: var(--fn-mono); font-size: 9px; letter-spacing: .14em; text-transform: uppercase;
  padding: 8px 20px; background: transparent; color: var(--muted);
  border: 1px solid var(--border); cursor: none; transition: all .2s;
}
.wf.on { color: var(--signal); border-color: var(--signal); background: var(--signal-bg); }
.wf:hover:not(.on) { color: var(--paper); border-color: oklch(32% .005 240); }

/* Project row */
.project-row {
  display: grid; grid-template-columns: 60px 1fr 200px;
  border-top: 1px solid var(--border);
  cursor: none; transition: background .35s; position: relative; overflow: hidden;
}
.project-row:last-child { border-bottom: 1px solid var(--border); }
.project-row:hover { background: var(--surf); }
/* Left accent */
.project-row::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: var(--signal); transform: scaleY(0); transform-origin: bottom;
  transition: transform .5s cubic-bezier(.16,1,.3,1);
}
.project-row:hover::after { transform: scaleY(1); }
/* Ghost project number */
.proj-ghost {
  position: absolute; right: 220px; top: 50%; transform: translateY(-50%);
  font-family: var(--fn-disp); font-weight: 800;
  font-size: clamp(80px, 12vw, 160px);
  color: oklch(100% 0 0 / 0.03); line-height: 1;
  pointer-events: none; user-select: none; transition: opacity .4s;
}
.project-row:hover .proj-ghost { color: oklch(100% 0 0 / 0.06); }

.proj-idx { font-family: var(--fn-mono); font-size: 10px; color: var(--dim); padding: 44px 0; letter-spacing: .1em; align-self: start; padding-left: 2px; }
.proj-main { padding: 44px 48px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
.proj-title {
  font-family: var(--fn-disp); font-weight: 800;
  font-size: clamp(26px, 2.8vw, 42px); color: var(--paper);
  letter-spacing: -.01em; line-height: .95; margin-bottom: 8px;
  transition: color .3s; text-wrap: pretty;
}
.project-row:hover .proj-title { color: var(--signal); }
.proj-sub { font-size: 11px; color: var(--muted); font-family: var(--fn-mono); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 16px; }
.proj-desc { font-size: 14px; color: oklch(48% .004 240); line-height: 1.75; max-width: 440px; }
.proj-expand { overflow: hidden; max-height: 0; transition: max-height .55s cubic-bezier(.16,1,.3,1); }
.project-row.open .proj-expand { max-height: 500px; }
.proj-bullets { list-style: none; margin-top: 22px; display: flex; flex-direction: column; gap: 10px; }
.proj-bullets li { font-size: 13px; color: oklch(50% .004 240); padding-left: 20px; position: relative; line-height: 1.65; }
.proj-bullets li::before { content: '→'; position: absolute; left: 0; color: var(--signal); }
.proj-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 18px; }
.proj-tag {
  font-family: var(--fn-mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
  color: oklch(48% .004 240); border: 1px solid oklch(26% .005 240); padding: 3px 9px;
}
.proj-side {
  padding: 36px 28px; display: flex; flex-direction: column;
  justify-content: space-between; align-items: flex-end;
}
.proj-date { font-family: var(--fn-mono); font-size: 10px; color: oklch(36% .004 240); letter-spacing: .08em; text-align: right; }
.proj-links { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; margin-top: 12px; }
.proj-link {
  font-family: var(--fn-mono); font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--dim); text-decoration: none; border: 1px solid var(--border); padding: 4px 10px;
  transition: all .2s;
}
.proj-link:hover { color: var(--signal); border-color: var(--signal); }
.proj-toggle {
  font-family: var(--fn-mono); font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--dim); margin-top: auto; display: flex; align-items: center; gap: 6px;
  transition: color .25s;
}
.project-row:hover .proj-toggle { color: oklch(60% .004 240); }
.proj-chevron { transition: transform .4s cubic-bezier(.16,1,.3,1); display: inline-block; font-size: 11px; }
.project-row.open .proj-chevron { transform: rotate(180deg); }

/* ── EXPERIENCE ── */
#experience { padding: 140px 0; border-top: 1px solid var(--border); }
.exp-list { margin-top: 80px; }
.exp-item {
  display: grid; grid-template-columns: 180px 1fr;
  gap: 0; padding: 72px 0; border-top: 1px solid var(--border);
  position: relative;
}
.exp-item:last-child { border-bottom: 1px solid var(--border); }
.exp-left { padding-right: 64px; }
.exp-period { font-family: var(--fn-mono); font-size: 10px; letter-spacing: .14em; color: var(--signal); text-transform: uppercase; margin-bottom: 8px; }
.exp-org { font-family: var(--fn-mono); font-size: 11px; color: var(--dim); letter-spacing: .06em; line-height: 1.8; }
.exp-right {}
.exp-role { font-family: var(--fn-disp); font-weight: 800; font-size: clamp(22px, 2.4vw, 34px); color: var(--paper); letter-spacing: -.01em; line-height: .95; margin-bottom: 24px; }
.exp-bullets { list-style: none; display: flex; flex-direction: column; gap: 16px; max-width: 580px; }
.exp-bullets li { font-size: 14px; color: oklch(50% .004 240); padding-left: 24px; position: relative; line-height: 1.8; }
.exp-bullets li::before { content: '—'; position: absolute; left: 0; color: var(--dim); }
.exp-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 24px; }
.exp-tag { font-family: var(--fn-mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: oklch(48% .004 240); border: 1px solid oklch(26% .005 240); padding: 3px 9px; }

/* ── SKILLS ── */
#skills { padding: 140px 0; border-top: 1px solid var(--border); background: var(--surf); }
.skills-intro { margin-top: 72px; margin-bottom: 80px; }
.skills-body { display: flex; flex-direction: column; gap: 0; }
.skill-cat {
  display: grid; grid-template-columns: 220px 1fr;
  gap: 0; padding: 32px 0; border-top: 1px solid var(--border);
  align-items: baseline;
}
.skill-cat:last-child { border-bottom: 1px solid var(--border); }
.sk-title { font-family: var(--fn-mono); font-size: 9px; letter-spacing: .24em; color: var(--signal); text-transform: uppercase; padding-right: 40px; padding-top: 3px; }
.sk-flow {
  font-family: var(--fn-disp); font-size: 14px; font-weight: 600;
  color: oklch(62% .004 240); line-height: 1.9;
  letter-spacing: .01em; max-width: 640px;
}
.sk-flow .sk-word {
  color: var(--paper); display: inline;
  transition: color .2s; cursor: default;
}
.sk-flow .sk-word:hover { color: var(--signal); }
.sk-flow .sk-sep { color: var(--dim); margin: 0 4px; }

/* ── CONTACT ── */
#contact { padding: 160px 0; border-top: 1px solid var(--border); overflow: hidden; }
.contact-big {
  font-family: var(--fn-disp); font-weight: 800;
  font-size: clamp(36px, 5.5vw, 80px); color: var(--paper);
  letter-spacing: -.025em; line-height: .92;
  margin-bottom: 72px; max-width: 820px;
}
.contact-big em { font-style: italic; font-family: var(--fn-serif); font-weight: 400; color: var(--signal); }
.contact-grid { display: grid; grid-template-columns: 1fr 360px; gap: 80px; align-items: start; }
.contact-sub {
  font-family: var(--fn-serif); font-style: italic;
  font-size: clamp(15px, 1.6vw, 20px); color: oklch(48% .004 240); line-height: 1.7; max-width: 420px;
}
.contact-sub em { font-style: normal; color: var(--paper); }
.contact-links { display: flex; flex-direction: column; gap: 0; }
.c-link {
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 0; border-bottom: 1px solid var(--border);
  text-decoration: none; color: var(--paper); transition: all .3s;
  position: relative; cursor: none;
}
.c-link:first-child { border-top: 1px solid var(--border); }
.c-link:hover { padding-left: 18px; }
.c-inner { display: flex; flex-direction: column; gap: 4px; }
.c-type { font-family: var(--fn-mono); font-size: 9px; color: var(--dim); letter-spacing: .22em; text-transform: uppercase; }
.c-val { font-family: var(--fn-disp); font-weight: 700; font-size: 22px; letter-spacing: -.01em; transition: color .3s; }
.c-link:hover .c-val { color: var(--signal); }
.c-arr { font-size: 18px; color: var(--dim); transition: all .3s; }
.c-link:hover .c-arr { color: var(--signal); transform: translate(4px,-4px); }

/* ── FOOTER ── */
footer {

/* ── CURSOR ── */
const dot = document.getElementById('c-dot');
const ring = document.getElementById('c-ring');
let mx = innerWidth/2, my = innerHeight/2, rx = mx, ry = my;
addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
(function loop() {
  dot.style.left = mx + 'px'; dot.style.top = my + 'px';
  rx += (mx - rx) * .1; ry += (my - ry) * .1;
  ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  requestAnimationFrame(loop);
})();
document.addEventListener('mouseover', e => {
  if (e.target.closest('a,button,.project-row,.c-link,.wf,select,input,.twk-close'))

/* ── NOISE ── */
const nc = document.getElementById('noise');
const nctx = nc.getContext('2d');
let noiseOp = 0.028;
function resizeNoise() { nc.width = innerWidth; nc.height = innerHeight; }
resizeNoise(); addEventListener('resize', resizeNoise);
(function grain() {
  const W = nc.width, H = nc.height;
  const id = nctx.createImageData(W, H); const d = id.data;
  for (let i = 0; i < d.length; i += 4) { const v = Math.random()*255; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; }
  nctx.putImageData(id, 0, 0); nc.style.opacity = noiseOp;
  requestAnimationFrame(grain);
})();

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── FIT TEXT: makes a text element fill its container width ── */
function fitText(el) {
  if (!el) return;
  const parent = el.parentElement;
  let lo = 10, hi = 600;
  el.style.fontSize = hi + 'px';
  while (hi - lo > 0.5) {
    const mid = (lo + hi) / 2;
    el.style.fontSize = mid + 'px';
    if (el.scrollWidth <= parent.clientWidth) lo = mid;
    else hi = mid;
  }
  el.style.fontSize = lo + 'px';
}

/* ── INTERSECTION OBSERVER FOR FI ── */
function useFI(delay = 0) {
  const ref = useRef();
  useEffect(() => {
    const el = ref.current; if (!el) return;
    el.classList.add('fi');
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setTimeout(() => el.classList.add('vis'), delay); obs.disconnect(); }
    }, { threshold: 0.06 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}
function FI({ children, delay = 0, tag = 'div', style }) {
  const ref = useFI(delay);
  return React.createElement(tag, { ref, style }, children);
}

/* ── SIGNAL CANVAS (hero background) ── */
function HeroCanvas() {
  const ref = useRef();
  useEffect(() => {
    const canvas = ref.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, t = 0, animId;
    function resize() { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; }
    resize(); window.addEventListener('resize', resize);
    function draw() {
      ctx.clearRect(0, 0, W, H);
      // Grid dots
      ctx.fillStyle = 'oklch(100% 0 0 / 0.04)';
      const spacing = 48;
      for (let x = 0; x < W; x += spacing) {
        for (let y = 0; y < H; y += spacing) {
          const pulse = Math.sin(t * 0.008 + x * 0.02 + y * 0.015) * 0.5 + 0.5;
          ctx.globalAlpha = pulse * 0.06;
          ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI * 2); ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
      // Main wave
      ctx.beginPath();
      const amp = H * 0.04, freq = 0.006;
      for (let x = 0; x <= W; x++) {
        const y = H * .62
          + Math.sin((x * freq + t * 0.012) * Math.PI * 2) * amp
          + Math.sin((x * freq * .5 + t * 0.008) * Math.PI * 2) * amp * .6
          + Math.sin((x * freq * 2.3 + t * 0.02) * Math.PI * 2) * amp * .25;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      const grad = ctx.createLinearGradient(0, 0, W, 0);
      grad.addColorStop(0, 'oklch(72% 0.21 185 / 0)');
      grad.addColorStop(0.3, 'oklch(72% 0.21 185 / 0.45)');
      grad.addColorStop(0.7, 'oklch(72% 0.21 185 / 0.35)');
      grad.addColorStop(1, 'oklch(72% 0.21 185 / 0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5; ctx.stroke();
      // Traveling glow dot
      const cx = ((t * 1.8) % (W + 200)) - 100;
      const cy = H * .62
        + Math.sin((cx * freq + t * 0.012) * Math.PI * 2) * amp
        + Math.sin((cx * freq * .5 + t * 0.008) * Math.PI * 2) * amp * .6;
      if (cx >= 0 && cx <= W) {
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 28);
        g.addColorStop(0, 'oklch(72% 0.21 185 / 0.9)');
        g.addColorStop(1, 'oklch(72% 0.21 185 / 0)');
        ctx.beginPath(); ctx.fillStyle = g;
        ctx.arc(cx, cy, 28, 0, Math.PI * 2); ctx.fill();
      }
      t++; animId = requestAnimationFrame(draw);
    }
    draw();
    return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(animId); };
  }, []);
  return <canvas ref={ref} className="hero-canvas" style={{ position:'absolute', inset:0, width:'100%', height:'100%' }} />;
}
